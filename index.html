<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Programação Web - Movimento Losango</title>

<style>
body {
    background-image: url("943.jpg");
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: white;
    font-family: "Monotype Corsiva", "Apple Chancery", cursive;
    font-weight: bold;
    text-align: center;
    margin: 0;
    overflow: hidden; /* Evita barras de rolagem durante a animação */
}

h1 {
    margin: 0; 
    padding-top: 20px;
    font-size: 3.5rem;
    text-shadow: 3px 3px 5px rgba(0,0,0,0.8);
    position: relative;
    z-index: 10;
}

p {
    display: inline-block; /* Necessário para o movimento funcionar bem */
    width: 50%;
    font-size: 1.5rem;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
    line-height: 1.4;
    padding: 20px;
    
    /* Configuração da Animação */
    position: relative;
    animation: movimentoLosango 8s linear infinite;
}

/* Criando o traçado em formato de Losango */
@keyframes movimentoLosango {
    0%   { top: 50px;  left: 0px; }       /* Topo central */
    25%  { top: 200px; left: 150px; }     /* Direita meio */
    50%  { top: 350px; left: 0px; }       /* Baixo central */
    75%  { top: 200px; left: -150px; }    /* Esquerda meio */
    100% { top: 50px;  left: 0px; }       /* Volta ao início */
}
</style>

</head>

<body>

    <h1>PROGRAMAÇÃO WEB</h1>

    <p>
        Programação web é o desenvolvimento de sites e aplicações para navegadores, 
        utilizando linguagens como HTML (estrutura), CSS (estilo) e JavaScript (interação) 
        para criar experiências digitais. Ela se divide em Front-end (visual/cliente) 
        e Back-end (servidor/dados).
    </p>

</body>
</html>
